<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Authenticating | Pehrawa</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/style.css"><style>body{background:#050505;display:flex;align-items:center;justify-content:center;min-height:100vh;}.auth-box{text-align:center;color:#fff;}</style></head><body><div class="auth-box"><h2 style="color:#ff6b00;">Authenticating...</h2><p style="color:#aaa;margin-top:12px;">Please wait while we sign you in.</p></div><script src="../js/config.js"></script><script src="../js/tracking.js"></script><script>(async function(){  const params = new URLSearchParams(window.location.search);  const token = params.get("token");  if(token){    try {      const res = await fetch((window.PEHRAWA_API_BASE||"http://localhost:5000")+"/api/auth/verify?token="+token);      const data = await res.json();      if(data.success){        localStorage.setItem("pehrawa_customer_token",data.token||token);        localStorage.setItem("pehrawa_customer",JSON.stringify(data.user));        window.location.href = "/";      } else { window.location.href = "/login?error=verify_failed"; }    } catch(e) { window.location.href = "/login?error=server_error"; }  } else { window.location.href = "/login?error=no_token"; }})();</script><script src="../js/premium-loader.js"></script></body></html>
