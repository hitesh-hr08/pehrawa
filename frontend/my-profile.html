<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Pehrawa Menswear</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/config.js"></script>
<style>
.profile-page{min-height:60vh;padding:60px 20px;background:#0d0d0d;}
.profile-card{max-width:480px;margin:0 auto;background:linear-gradient(145deg,#1a1a1a,#0f0f0f);border-radius:24px;padding:48px 36px 36px;border:1px solid #2a2a2a;box-shadow:0 20px 60px rgba(0,0,0,0.5);position:relative;overflow:hidden;}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f97316,#ff7a00,#ea580c);}
.profile-avatar-wrap{width:96px;height:96px;border-radius:50%;margin:0 auto 16px;position:relative;background:linear-gradient(135deg,#f97316,#ea580c);padding:3px;cursor:pointer;}
.profile-avatar-inner{width:100%;height:100%;border-radius:50%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden;}
.profile-avatar-inner img{width:100%;height:100%;object-fit:cover;}
.profile-avatar-wrap::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(249,115,22,0.3);animation:pulse-ring 2s ease-in-out infinite;}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.5;}}
.profile-avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;color:#fff;font-size:14px;z-index:2;}
.profile-avatar-wrap:hover .profile-avatar-overlay{opacity:1;}
.profile-avatar-overlay i{font-size:20px;}
#profilePicInput{display:none;}
.upload-success{text-align:center;color:#22c55e;font-size:13px;margin:-8px 0 16px;display:none;}
.pic-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:8px;background:#1a1a1a;border:1px solid #333;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.5);min-width:160px;z-index:99;overflow:hidden;display:none;}
.pic-menu.open{display:block;}
.pic-menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#ccc;font-size:13px;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.pic-menu-item:hover{background:#2a2a2a;color:#ff7a00;}
.pic-menu-item i{width:16px;text-align:center;font-size:14px;color:#999;}
.pic-menu-item:hover i{color:#ff7a00;}
.pic-menu-item.danger{color:#e74c3c;}
.pic-menu-item.danger i{color:#e74c3c;}
.pic-menu-item.danger:hover{background:#2a0000;}
.pic-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.pic-modal-overlay.open{opacity:1;pointer-events:all;}
.pic-modal-overlay img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;}
.pic-modal-close{position:absolute;top:20px;right:30px;color:#fff;font-size:36px;cursor:pointer;background:none;border:none;}
.profile-name{text-align:center;font-size:24px;font-weight:700;color:#fff;margin:0 0 4px;}
.profile-email{text-align:center;font-size:14px;color:#999;margin:0 0 30px;}
.profile-divider{height:1px;background:linear-gradient(90deg,transparent,#2a2a2a,transparent);margin:0 0 24px;}
.profile-detail{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#141414;border-radius:12px;margin-bottom:10px;border:1px solid #222;transition:all 0.2s;}
.profile-detail:hover{border-color:#333;background:#191919;}
.profile-detail-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(249,115,22,0.15),rgba(234,88,12,0.1));display:flex;align-items:center;justify-content:center;color:#f97316;font-size:16px;flex-shrink:0;}
.profile-detail-content{flex:1;min-width:0;}
.profile-detail-label{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.profile-detail-value{font-size:15px;color:#fff;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.profile-actions{display:flex;gap:12px;margin-top:28px;}
.profile-btn{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.profile-btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;}
.profile-btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(249,115,22,0.3);}
.profile-btn-secondary{background:transparent;color:#e74c3c;border:1px solid #e74c3c;}
.profile-btn-secondary:hover{background:rgba(231,76,60,0.1);}
.empty-profile{text-align:center;padding:60px 20px;}
.empty-profile i{font-size:48px;color:#f97316;margin-bottom:16px;}
.empty-profile h3{color:#fff;font-size:20px;margin:0 0 8px;}
.empty-profile p{color:#888;margin:0 0 20px;}
.empty-profile a{color:#f97316;text-decoration:underline;}
@media(max-width:480px){.profile-card{padding:32px 20px 24px;}}
</style>
</head>
<body>

<header class="header">
<div class="container">
<a href="home.html" class="logo"><img src="../images/logo.png" alt="Pehrawa Logo"></a>
<nav class="navbar">
<ul class="nav-links">
<li><a href="home.html">HOME</a></li>
<li><a href="shop.html">SHOP</a></li>
<li><a href="custom-print.html">CUSTOM PRINT</a></li>
<li><a href="track-order.html">TRACK ORDER</a></li>
<li><a href="about.html">ABOUT US</a></li>
<li><a href="contact.html">CONTACT US</a></li>
</ul>
</nav>
<div class="nav-icons">
<div class="search-wrapper">
<i class="fa-solid fa-magnifying-glass search-icon"></i>
<input type="text" class="search-input" placeholder="Search products...">
</div>
<a href="wishlist.html"><i class="fa-regular fa-heart"></i><span>0</span></a>
<a href="cart.html"><i class="fa-solid fa-cart-shopping"></i><span>0</span></a>
</div>
<div class="menu-btn"><i class="fa-solid fa-bars"></i></div>
</div>
</header>

<section class="cart-hero">
<div class="container">
<h1>MY PROFILE</h1>
<p>Manage your account details.</p>
</div>
</section>

<section class="profile-page">
<div id="profileContainer"></div>
</section>

<footer class="footer">
<div class="copyright">&copy; 2026 Pehrawa Menswear. All Rights Reserved.</div>
</footer>

<script src="../js/script.js"></script>
<script src="../js/customer-auth.js"></script>
<script>
(function () {
  var container = document.getElementById("profileContainer");

  if (!window.isCustomerLoggedIn()) {
    container.innerHTML =
      '<div class="empty-profile">' +
        '<i class="fa-solid fa-lock"></i>' +
        '<h3>Please login to view your profile</h3>' +
        '<p><a href="home.html">Go to Home</a></p>' +
      '</div>';
    return;
  }

  var c = window.getCustomer();
  var api = window.PEHRAWA_API_BASE || "http://localhost:5000";
  var token = window.getCustomerToken();
  var initials = c.name ? c.name.split(" ").map(function(w){return w[0]}).join("").toUpperCase().slice(0,2) : "?";
  var avatarImg = c.image_url ? '<img src="' + c.image_url + '" alt="avatar">' : initials;

  var hasPic = !!c.image_url;
  var picMenuHtml = hasPic
    ? '<div class="pic-menu" id="picMenu">' +
        '<button class="pic-menu-item" data-action="view"><i class="fa-solid fa-eye"></i> View</button>' +
        '<button class="pic-menu-item" data-action="change"><i class="fa-solid fa-camera"></i> Change</button>' +
        '<button class="pic-menu-item danger" data-action="remove"><i class="fa-solid fa-trash-can"></i> Remove</button>' +
      '</div>'
    : '';

  container.innerHTML =
    '<div class="profile-card">' +
      '<div class="profile-avatar-wrap" id="profilePicTrigger" title="Profile picture">' +
        '<div class="profile-avatar-inner">' + avatarImg + '</div>' +
        '<div class="profile-avatar-overlay"><i class="fa-solid fa-camera"></i></div>' +
        picMenuHtml +
      '</div>' +
      '<input type="file" id="profilePicInput" accept="image/*">' +
      '<p class="upload-success" id="uploadSuccess"><i class="fa-solid fa-check-circle"></i> Profile picture updated</p>' +
      '<div class="pic-modal-overlay" id="picModal">' +
        '<button class="pic-modal-close" id="picModalClose">&times;</button>' +
        '<img id="picModalImg" src="">' +
      '</div>' +
      '<h2 class="profile-name">' + (c.name || "Customer") + '</h2>' +
      '<p class="profile-email">' + (c.email || "") + '</p>' +
      '<div class="profile-divider"></div>' +
      '<div class="profile-detail">' +
        '<div class="profile-detail-icon"><i class="fa-solid fa-user"></i></div>' +
        '<div class="profile-detail-content">' +
          '<div class="profile-detail-label">Full Name</div>' +
          '<div class="profile-detail-value">' + (c.name || "-") + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="profile-detail">' +
        '<div class="profile-detail-icon"><i class="fa-solid fa-envelope"></i></div>' +
        '<div class="profile-detail-content">' +
          '<div class="profile-detail-label">Email Address</div>' +
          '<div class="profile-detail-value">' + (c.email || "-") + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="profile-detail">' +
        '<div class="profile-detail-icon"><i class="fa-solid fa-phone"></i></div>' +
        '<div class="profile-detail-content">' +
          '<div class="profile-detail-label">Phone Number</div>' +
          '<div class="profile-detail-value">' + (c.phone || "Not provided") + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="profile-actions">' +
        '<a href="my-orders.html" class="profile-btn profile-btn-primary"><i class="fa-solid fa-box"></i> My Orders</a>' +
        '<button class="profile-btn profile-btn-secondary" id="profileLogoutBtn"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>' +
      '</div>' +
    '</div>';

  function closePicMenu() {
    var m = document.getElementById("picMenu");
    if (m) m.classList.remove("open");
  }

  document.addEventListener("click", function (e) {
    if (!e.target.closest("#profilePicTrigger")) closePicMenu();
  });

  document.getElementById("profilePicTrigger").addEventListener("click", function (e) {
    e.stopPropagation();
    var menu = document.getElementById("picMenu");
    if (menu) {
      menu.classList.toggle("open");
    } else {
      document.getElementById("profilePicInput").click();
    }
  });

  function bindPicMenu() {
    var menu = document.getElementById("picMenu");
    if (!menu) return;
    var newMenu = menu.cloneNode(true);
    menu.parentNode.replaceChild(newMenu, menu);
    newMenu.addEventListener("click", function (e) {
    var item = e.target.closest(".pic-menu-item");
    if (!item) return;
    closePicMenu();
    var action = item.dataset.action;
    if (action === "view") {
      var img = document.getElementById("picModalImg");
      img.src = c.image_url;
      document.getElementById("picModal").classList.add("open");
    } else if (action === "change") {
      document.getElementById("profilePicInput").click();
    } else if (action === "remove") {
      if (!confirm("Remove profile picture?")) return;
      fetch(api + "/api/customers/" + c.id + "/profile-picture", {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.success) {
          c.image_url = null;
          localStorage.setItem("pehrawa_customer", JSON.stringify(c));
          var initials = c.name ? c.name.split(" ").map(function(w){return w[0]}).join("").toUpperCase().slice(0,2) : "?";
          var wrap = document.getElementById("profilePicTrigger");
          wrap.innerHTML =
            '<div class="profile-avatar-inner">' + initials + '</div>' +
            '<div class="profile-avatar-overlay"><i class="fa-solid fa-camera"></i></div>';
          if (typeof window.updateProfileIcon === "function") window.updateProfileIcon();
        } else {
          alert(data.message || "Failed to remove");
        }
      })
      .catch(function () {
        alert("Failed to remove profile picture");
      });
    }
  });
  }

  bindPicMenu();

  document.getElementById("profilePicInput").addEventListener("change", function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append("profile_picture", file);
    var wrap = document.getElementById("profilePicTrigger");
    wrap.style.pointerEvents = "none";
    wrap.style.opacity = "0.6";
    fetch(api + "/api/customers/" + c.id + "/profile-picture", {
      method: "POST",
      headers: { "Authorization": "Bearer " + token },
      body: formData
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.success) {
        c.image_url = data.customer.image_url;
        localStorage.setItem("pehrawa_customer", JSON.stringify(c));
        var inner = document.querySelector(".profile-avatar-inner");
        if (inner) inner.innerHTML = '<img src="' + c.image_url + '?t=' + Date.now() + '" alt="avatar">';
        var wrap = document.getElementById("profilePicTrigger");
        wrap.innerHTML =
          '<div class="profile-avatar-inner"><img src="' + c.image_url + '?t=' + Date.now() + '" alt="avatar"></div>' +
          '<div class="profile-avatar-overlay"><i class="fa-solid fa-camera"></i></div>' +
          '<div class="pic-menu" id="picMenu">' +
            '<button class="pic-menu-item" data-action="view"><i class="fa-solid fa-eye"></i> View</button>' +
            '<button class="pic-menu-item" data-action="change"><i class="fa-solid fa-camera"></i> Change</button>' +
            '<button class="pic-menu-item danger" data-action="remove"><i class="fa-solid fa-trash-can"></i> Remove</button>' +
          '</div>';
        bindPicMenu();
        var success = document.getElementById("uploadSuccess");
        success.style.display = "block";
        setTimeout(function () { success.style.display = "none"; }, 3000);
        if (typeof window.updateProfileIcon === "function") window.updateProfileIcon();
      } else {
        alert(data.message || "Upload failed");
      }
    })
    .catch(function (err) {
      alert("Upload failed: " + (err.message || "Network error"));
    })
    .finally(function () {
      wrap.style.pointerEvents = "";
      wrap.style.opacity = "1";
    });
  });

  document.getElementById("picModal").addEventListener("click", function (e) {
    if (e.target === this || e.target.id === "picModalClose") {
      this.classList.remove("open");
    }
  });

  document.getElementById("profileLogoutBtn").addEventListener("click", function () {
    window.logoutCustomer();
    window.location.href = "home.html";
  });
})();
</script>
</body>
</html>
