<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pehrawa | Reset Password</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../css/style.css"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}body{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;}.login-box{width:420px;padding:40px;background:#111;border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:center;}.login-box h2{color:#fff;font-size:28px;letter-spacing:4px;margin-bottom:6px;}.login-box .sub{color:#aaa;font-size:13px;margin-bottom:24px;}.login-box input{width:100%;display:block;padding:14px 16px;margin:10px 0;background:#0d0d0d;border:1px solid #181818;border-radius:8px;color:#fff;outline:none;font-size:14px;transition:.3s;}.login-box input:focus{border-color:#ff6b00;}.login-box button{width:100%;padding:14px;margin-top:14px;border:none;border-radius:8px;background:#ffffff;color:#000;font-weight:700;font-size:15px;cursor:pointer;transition:.3s;}.login-box button:hover{background:#e0e0e0;}.login-box button:disabled{opacity:0.6;cursor:not-allowed;}#msg{color:#ff4d4d;font-size:13px;margin-top:12px;min-height:20px;}#msg.success{color:#4caf50;}.back-link{display:inline-block;margin-top:18px;color:#666;font-size:13px;text-decoration:none;}.back-link:hover{color:#ff6b00;}.step-indicator{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}.step-dot{width:10px;height:10px;border-radius:50%;background:#333;}.step-dot.active{background:#ff6b00;}</style></head><body><div class="login-box" id="step1">  <h2>RESET PASSWORD</h2>  <p class="sub">Enter your email to receive a reset link</p>  <div class="step-indicator"><span class="step-dot active"></span><span class="step-dot"></span></div>  <form id="forgotForm">    <input type="email" id="resetEmail" placeholder="Your email address" required>    <button type="submit" id="sendResetBtn">Send Reset Link</button>    <p id="msg"></p>  </form>  <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a></div><div class="login-box" id="step2" style="display:none;">  <h2>SET NEW PASSWORD</h2>  <p class="sub">Enter your new password</p>  <div class="step-indicator"><span class="step-dot"></span><span class="step-dot active"></span></div>  <form id="resetForm">    <input type="hidden" id="resetToken">    <input type="hidden" id="resetEmailHidden">    <input type="password" id="newPassword" placeholder="New password (min 6 chars)" minlength="6" required>    <input type="password" id="confirmPassword" placeholder="Confirm password" required>    <button type="submit" id="resetBtn">Reset Password</button>    <p id="msg2"></p>  </form>  <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a></div><script src="../js/config.js"></script><script>(function(){  var api = window.PEHRAWA_API_BASE || "http://localhost:5000";  // Check URL params for direct reset link  var params = new URLSearchParams(window.location.search);  var urlToken = params.get("token");  var urlEmail = params.get("email");  if (urlToken && urlEmail) {    document.getElementById("step1").style.display = "none";    document.getElementById("step2").style.display = "block";    document.getElementById("resetToken").value = urlToken;    document.getElementById("resetEmailHidden").value = decodeURIComponent(urlEmail);  }  document.getElementById("forgotForm").addEventListener("submit", async function(e) {    e.preventDefault();    var btn = document.getElementById("sendResetBtn");    var msg = document.getElementById("msg");    btn.disabled = true;    btn.textContent = "Sending...";    msg.textContent = "";    msg.className = "";    try {      var res = await fetch(api + "/api/public/forgot-password", {        method: "POST",        headers: { "Content-Type": "application/json" },        body: JSON.stringify({ email: document.getElementById("resetEmail").value.trim() })      });      var data = await res.json();      msg.textContent = data.message || "Check your email for reset link";      if (data.success) msg.className = "success";    } catch (err) {      msg.textContent = "Connection error";    }    btn.disabled = false;    btn.textContent = "Send Reset Link";  });  document.getElementById("resetForm").addEventListener("submit", async function(e) {    e.preventDefault();    var btn = document.getElementById("resetBtn");    var msg = document.getElementById("msg2");    var pw = document.getElementById("newPassword").value;    var cpw = document.getElementById("confirmPassword").value;    if (pw !== cpw) {      msg.textContent = "Passwords do not match";      return;    }    if (pw.length < 6) {      msg.textContent = "Password must be at least 6 characters";      return;    }    btn.disabled = true;    btn.textContent = "Resetting...";    msg.textContent = "";    msg.className = "";    try {      var res = await fetch(api + "/api/public/reset-password", {        method: "POST",        headers: { "Content-Type": "application/json" },        body: JSON.stringify({          token: document.getElementById("resetToken").value,          email: document.getElementById("resetEmailHidden").value,          password: pw        })      });      var data = await res.json();      msg.textContent = data.message || "Password reset successful";      if (data.success) {        msg.className = "success";        btn.textContent = "Redirecting...";        setTimeout(function() { window.location.href = "/login"; }, 2000);      }    } catch (err) {      msg.textContent = "Connection error";    }    btn.disabled = false;    if (!msg.classList.contains("success")) btn.textContent = "Reset Password";  });})();</script></body></html>
