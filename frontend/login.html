<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pehrawa | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,107,0,.08),transparent 50%),radial-gradient(circle at 70% 60%,rgba(255,107,0,.05),transparent 50%);pointer-events:none;}
.logo-bg{position:fixed;inset:0;background:url("../images/logo.png") no-repeat center;background-size:1000px auto;opacity:0.04;z-index:0;pointer-events:none;}
.login-wrap{position:relative;z-index:1;width:100%;min-height:100vh;padding:20px;}
.login-box{width:400px;padding:40px;background:#0a0a0a;border:1px solid #181818;border-radius:12px;text-align:center;position:absolute;left:calc(50% + 60px);top:50%;transform:translate(-50%,-50%);}
.login-box h2{color:#ff6b00;font-size:28px;letter-spacing:2px;margin-bottom:6px;}
.login-box .sub{color:#aaa;font-size:13px;margin-bottom:28px;}
.login-box input{width:100%;display:block;padding:14px 16px;margin:10px 0;background:#0d0d0d;border:1px solid #181818;border-radius:8px;color:#fff;outline:none;font-size:14px;transition:.3s;}
.login-box input:focus{border-color:#ff6b00;box-shadow:0 0 12px rgba(255,107,0,.15);}
.login-box button[type="submit"]{width:100%;padding:14px;margin-top:14px;border:none;border-radius:8px;background:#ff6b00;color:#000;font-weight:700;font-size:15px;cursor:pointer;transition:.3s;}
.login-box button[type="submit"]:hover{background:#ff7a1a;transform:translateY(-2px);}
#msg{color:#ff4d4d;font-size:13px;margin-top:12px;min-height:20px;}
.auth-switch{margin-top:18px;color:#888;font-size:13px;}
.auth-switch a{color:#ff6b00;font-weight:600;}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#222;}
.divider span{color:#666;font-size:12px;}
.google-btn{width:100%;padding:12px;border:1px solid #222;border-radius:8px;background:#0d0d0d;color:#fff;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;}
.google-btn:hover{background:#1a1a1a;border-color:#ff6b00;}
.google-btn i{color:#ff6b00;font-size:18px;}
.back-home{display:inline-flex;align-items:center;gap:8px;margin-top:22px;color:#666;font-size:13px;text-decoration:none;transition:.3s;}
.back-home:hover{color:#ff6b00;}
</style>
</head>
<body>

<div class="logo-bg"></div>
<div class="login-wrap">
<div class="login-box">
    <h2>LOGIN</h2>
    <p class="sub">Sign in to continue shopping</p>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
      <div style="text-align:right;margin:4px 0 0;"><a href="reset-password.html" style="color:#ff6b00;font-size:12px;text-decoration:none;">Forgot Password?</a></div>
      <button type="submit">Login</button>
      <p id="msg"></p>
      <div class="divider" id="googleDivider"><span>OR</span></div>
      <button class="google-btn" id="googleBtn" onclick="window.location.href=(window.PEHRAWA_API_BASE||'http://localhost:5000')+'/api/auth/google'">
        <i class="fa-brands fa-google"></i> Sign in with Google
      </button>
      <p class="auth-switch">New customer? <a href="register.html">Create account</a></p>
      <script>(function(){if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){var e=document.getElementById('googleBtn'),d=document.getElementById('googleDivider');if(e)e.style.display='none';if(d)d.style.display='none'}})();</script>
    </form>
    <a href="home.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
</div>
</div>

<script src="../js/config.js"></script>
<script src="../js/tracking.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/login.js"></script>

<div class="whatsapp-float" onclick="window.open('https://wa.me/919855707708','_blank')" role="button" tabindex="0" aria-label="Chat on WhatsApp">
  <i class="fa-brands fa-whatsapp"></i>
  <span class="wa-tooltip">Chat with us</span>
  <span class="wa-badge"></span>
</div>
</body>
</html>
