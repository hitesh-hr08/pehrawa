<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Pehrawa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0b0b;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-page-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%;min-height:100vh;}
.logo-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1200px;height:1200px;background:url("../images/logo.png") no-repeat center;background-size:contain;opacity:0.06;z-index:0;pointer-events:none;}
.logo-bg::after{content:"";position:absolute;width:100%;height:100%;background:radial-gradient(circle,rgba(255,102,0,0.25),transparent 60%);top:0;left:0;}
.login-box{position:relative;width:360px;padding:35px;background:#111;border:1px solid rgba(255,102,0,0.25);border-radius:14px;text-align:center;box-shadow:0 0 30px rgba(255,102,0,0.15);z-index:1;}
.login-box h2{color:#ff6a00;letter-spacing:4px;margin-bottom:5px;}
.login-box p{color:#aaa;font-size:13px;margin-bottom:20px;}
.login-box input{width:100%;display:block;padding:12px;margin:10px 0;background:#0f0f0f;border:1px solid rgba(255,106,0,0.3);border-radius:8px;color:#fff;outline:none;box-sizing:border-box;}
.login-box input:focus{border-color:#ff6a00;box-shadow:0 0 10px rgba(255,106,0,0.3);}
.login-box button[type="submit"]{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#ff6a00;color:#000;font-weight:700;cursor:pointer;transition:0.3s;}
.login-box button[type="submit"]:hover{background:#ff7a1a;}
#msg{color:#ff4d4d;font-size:13px;margin-top:10px;}
.auth-switch{margin-top:16px;}
.auth-switch a{color:#ff6a00;font-weight:700;}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#333;}
.divider span{color:#666;font-size:12px;}
.google-btn,.google-btn-inline{width:100%;padding:12px;border:1px solid #444;border-radius:8px;background:#1a1a1a;color:#fff;font-weight:600;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;font-size:14px;}
.google-btn:hover,.google-btn-inline:hover{background:#2a2a2a;border-color:#ff6a00;}
.google-btn i,.google-btn-inline i{color:#ff6a00;font-size:18px;}
.back-home{color:#666;font-size:12px;margin-top:20px;display:block;text-decoration:none;transition:0.3s;}
.back-home:hover{color:#ff6a00;}
.back-home i{margin-right:6px;}
</style>
</head>
<body>

<div class="login-page-wrap">
<div class="logo-bg"></div>
<div class="login-box">
    <h2>Create Account</h2>
    <p>Save your Pehrawa orders and checkout faster</p>
    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" autocomplete="name" required>
      <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      <input type="tel" id="phone" placeholder="Phone Number" autocomplete="tel">
      <input type="password" id="password" placeholder="Password" autocomplete="new-password" required>
      <button type="submit">Create Account</button>
      <p id="msg"></p>
      <div class="divider" id="googleDivider"><span>OR</span></div>
      <button class="google-btn" id="googleBtn" onclick="window.location.href=(window.PEHRAWA_API_BASE||'http://localhost:5000')+'/api/auth/google'">
        <i class="fa-brands fa-google"></i> Sign up with Google
      </button>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
      <script>(function(){if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){var e=document.getElementById('googleBtn'),d=document.getElementById('googleDivider');if(e)e.style.display='none';if(d)d.style.display='none'}})();</script>
    </form>
    <a href="home.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/animations.js"></script>
<script>
const registerForm = document.getElementById("registerForm");
const msg = document.getElementById("msg");

registerForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  msg.innerText = "";

  const apiBase = window.PEHRAWA_API_BASE || "http://localhost:5000";
  const payload = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    password: document.getElementById("password").value
  };

  try {
    const res = await fetch(`${apiBase}/api/customers/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.success) {
      msg.innerText = data.message || "Account could not be created";
      return;
    }

    localStorage.setItem("pehrawa_customer_token", data.token);
    localStorage.setItem("pehrawa_customer", JSON.stringify(data.customer));
    window.location.href = "home.html";
  } catch (error) {
    msg.innerText = "Start backend server before creating account.";
  }
});
</script>

<a href="https://wa.me/919855707708" target="_blank" class="whatsapp-float" aria-label="Chat on WhatsApp">
  <i class="fa-brands fa-whatsapp"></i>
  <span class="wa-tooltip">Chat with us</span>
</a>
</body>
</html>
