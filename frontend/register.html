<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pehrawa | Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,107,0,.08),transparent 50%),radial-gradient(circle at 70% 60%,rgba(255,107,0,.05),transparent 50%);pointer-events:none;}
.logo-bg{position:fixed;inset:0;background:url("../images/logo.png") no-repeat center;background-size:1000px auto;opacity:0.04;z-index:0;pointer-events:none;}
.register-wrap{position:relative;z-index:1;width:100%;min-height:100vh;padding:20px;}
.register-box{width:420px;padding:40px;background:#0a0a0a;border:1px solid #181818;border-radius:12px;text-align:center;position:absolute;left:calc(50% + 60px);top:50%;transform:translate(-50%,-50%);}
.register-box h2{color:#ff6b00;font-size:28px;letter-spacing:2px;margin-bottom:6px;}
.register-box .sub{color:#aaa;font-size:13px;margin-bottom:28px;}
.register-box input{width:100%;display:block;padding:14px 16px;margin:10px 0;background:#0d0d0d;border:1px solid #181818;border-radius:8px;color:#fff;outline:none;font-size:14px;transition:.3s;}
.register-box input:focus{border-color:#ff6b00;box-shadow:0 0 12px rgba(255,107,0,.15);}
.register-box button[type="submit"]{width:100%;padding:14px;margin-top:14px;border:none;border-radius:8px;background:#ff6b00;color:#000;font-weight:700;font-size:15px;cursor:pointer;transition:.3s;}
.register-box button[type="submit"]:hover{background:#ff7a1a;transform:translateY(-2px);}
#msg{color:#ff4d4d;font-size:13px;margin-top:12px;min-height:20px;}
.auth-switch{margin-top:18px;color:#888;font-size:13px;}
.auth-switch a{color:#ff6b00;font-weight:600;}
.back-home{display:inline-flex;align-items:center;gap:8px;margin-top:22px;color:#666;font-size:13px;text-decoration:none;transition:.3s;}
.back-home:hover{color:#ff6b00;}
</style>
</head>
<body>
<div class="logo-bg"></div>
<div class="register-wrap">
<div class="register-box">
    <h2>CREATE ACCOUNT</h2>
    <p class="sub">Join the Pehrawa community</p>
    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" minlength="6" required>
      <button type="submit">Register</button>
      <p id="msg"></p>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </form>
    <a href="home.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
</div>
</div>
<script src="../js/config.js"></script>
<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  var msg = document.getElementById("msg");
  var name = document.getElementById("name").value.trim();
  var email = document.getElementById("email").value.trim();
  var password = document.getElementById("password").value;
  try {
    var res = await fetch((window.PEHRAWA_API_BASE||"http://localhost:5000")+"/api/auth/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name,email,password})
    });
    var data = await res.json();
    if(data.success){
      localStorage.setItem("pehrawaToken",data.token);
      localStorage.setItem("pehrawaUser",JSON.stringify(data.user));
      window.location.href = "home.html";
    } else {
      msg.textContent = data.message || "Registration failed";
    }
  } catch(err) {
    msg.textContent = "Server not connected";
  }
});
</script>
<div class="whatsapp-float" onclick="window.open('https://wa.me/919855707708','_blank')" role="button" tabindex="0" aria-label="Chat on WhatsApp">
  <i class="fa-brands fa-whatsapp"></i>
  <span class="wa-tooltip">Chat with us</span>
  <span class="wa-badge"></span>
</div>
</body>
</html>
