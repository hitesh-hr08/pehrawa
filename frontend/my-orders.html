<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | Pehrawa Menswear</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/config.js"></script>
<style>
.orders-page{min-height:60vh;padding:60px 20px;background:#0d0d0d;}
.orders-container{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.order-card{background:linear-gradient(145deg,#1a1a1a,#0f0f0f);border-radius:16px;padding:24px;border:1px solid #2a2a2a;box-shadow:0 8px 30px rgba(0,0,0,0.3);transition:all 0.2s;}
.order-card:hover{border-color:#3a3a3a;}
.order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.order-id{font-size:16px;font-weight:700;color:#fff;}
.order-date{color:#888;font-size:13px;margin-left:10px;}
.order-status{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(249,115,22,0.15);color:#f97316;}
.order-status.Delivered{background:rgba(34,197,94,0.15);color:#22c55e;}
.order-status.Shipped{background:rgba(59,130,246,0.15);color:#3b82f6;}
.order-status.Cancelled{background:rgba(231,76,60,0.15);color:#e74c3c;}
.order-items{color:#aaa;font-size:14px;margin-bottom:12px;line-height:1.6;}
.order-items div{padding:2px 0;}
.order-footer{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid #2a2a2a;}
.order-total{font-size:18px;font-weight:700;color:#fff;}
.order-track-link{color:#f97316;font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.order-track-link:hover{color:#ff7a00;gap:10px;}
.empty-orders{text-align:center;padding:60px 20px;}
.empty-orders i{font-size:48px;color:#f97316;margin-bottom:16px;}
.empty-orders h3{color:#fff;font-size:20px;margin:0 0 8px;}
.empty-orders p{color:#888;margin:0 0 20px;}
.empty-orders .shop-now-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.2s;}
.empty-orders .shop-now-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(249,115,22,0.3);}
@media(max-width:480px){.order-card{padding:18px;}}
</style>
</head>
<body>

<header class="header">
<div class="container">
<a href="home.html" class="logo"><img src="../images/logo.png" alt="Pehrawa Logo"></a>
<nav class="navbar">
<ul class="nav-links">
<li><a href="home.html">HOME</a></li>
<li><a href="shop.html">SHOP</a></li>
<li><a href="custom-print.html">CUSTOM PRINT</a></li>
<li><a href="track-order.html">TRACK ORDER</a></li>
<li><a href="about.html">ABOUT US</a></li>
<li><a href="contact.html">CONTACT US</a></li>
</ul>
</nav>
<div class="nav-icons">
<div class="search-wrapper">
<i class="fa-solid fa-magnifying-glass search-icon"></i>
<input type="text" class="search-input" placeholder="Search products...">
</div>
<a href="wishlist.html"><i class="fa-regular fa-heart"></i><span>0</span></a>
<a href="cart.html"><i class="fa-solid fa-cart-shopping"></i><span>0</span></a>
</div>
<div class="menu-btn"><i class="fa-solid fa-bars"></i></div>
</div>
</header>

<section class="cart-hero">
<div class="container">
<h1>MY ORDERS</h1>
<p>View your order history and track status.</p>
</div>
</section>

<section class="orders-page">
<div class="orders-container" id="myOrdersContainer">
<div class="empty-orders">
<i class="fa-solid fa-spinner fa-spin"></i>
<h3>Loading orders...</h3>
</div>
</div>
</section>

<footer class="footer">
<div class="copyright">&copy; 2026 Pehrawa Menswear. All Rights Reserved.</div>
</footer>

<script src="../js/script.js"></script>
<script src="../js/customer-auth.js"></script>
<script>
(function () {
  var container = document.getElementById("myOrdersContainer");

  if (!window.isCustomerLoggedIn()) {
    container.innerHTML =
      '<div class="empty-orders">' +
        '<i class="fa-solid fa-lock"></i>' +
        '<h3>Please login to view your orders</h3>' +
        '<p><a href="home.html" style="color:#f97316;text-decoration:underline;">Go to Home</a></p>' +
      '</div>';
    return;
  }

  var customer = window.getCustomer();
  var api = window.PEHRAWA_API_BASE || "http://localhost:5000";
  var token = window.getCustomerToken();

  fetch(api + "/api/customers/" + customer.id + "/orders", {
    headers: { "Authorization": "Bearer " + token }
  })
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (!data.success || !data.orders || data.orders.length === 0) {
      container.innerHTML =
        '<div class="empty-orders">' +
          '<i class="fa-solid fa-box"></i>' +
          '<h3>No orders yet</h3>' +
          '<p>Start shopping to see your orders here.</p>' +
          '<a href="shop.html" class="shop-now-btn"><i class="fa-solid fa-bag-shopping"></i> Shop Now</a>' +
        '</div>';
      return;
    }

    var html = '';
    data.orders.forEach(function (order) {
      var status = order.status || "Pending";
      html +=
        '<div class="order-card">' +
          '<div class="order-header">' +
            '<div><span class="order-id">Order #' + order.id + '</span>' +
            '<span class="order-date">' + new Date(order.created_at).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" }) + '</span></div>' +
            '<span class="order-status ' + status + '">' + status + '</span>' +
          '</div>' +
          '<div class="order-items">' + (order.items || "").split("\n").map(function (l) { return "<div>" + l + "</div>"; }).join("") + '</div>' +
          '<div class="order-footer">' +
            '<span class="order-total">₹' + parseFloat(order.total_amount).toFixed(2) + '</span>' +
            '<a href="track-order.html?id=' + order.id + '" class="order-track-link">Track Order <i class="fa-solid fa-arrow-right"></i></a>' +
          '</div>' +
        '</div>';
    });
    container.innerHTML = html;
  })
  .catch(function () {
    container.innerHTML =
      '<div class="empty-orders">' +
        '<i class="fa-solid fa-exclamation-triangle"></i>' +
        '<h3>Could not load orders</h3>' +
        '<p>Please try again later.</p>' +
      '</div>';
  });
})();
</script>
</body>
</html>
