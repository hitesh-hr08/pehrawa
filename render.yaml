services:
  - type: web
    name: pehrawa-api
    runtime: node
    repo: https://github.com/hitesh-hr08/pehrawa
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pehrawa-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false

databases:
  - name: pehrawa-db
    region: singapore
    plan: free
    databaseName: pehrawa
    ipAllowList: []
